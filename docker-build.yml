name: Build & Push Docker Image

# ── Triggers ─────────────────────────────────────────────────────
on:
  push:
    branches:
      - main                  # Auto-build on every push to main
  workflow_dispatch:          # Also allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # 2hr cap — build takes ~45–60 min

    steps:

      # ── 1. Free up disk space ─────────────────────────────────
      # GitHub runners only have ~14GB free by default.
      # This removes pre-installed tools you don't need and gets
      # you ~45–50GB — enough for the CUDA image + PyTorch + XTTS.
      - name: Free disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean
          docker system prune -af
          echo "=== Disk after cleanup ==="
          df -h

      # ── 2. Check out your code ────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Set up Docker Buildx ───────────────────────────────
      # Buildx is the modern Docker build engine — faster,
      # better caching, required for multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub ───────────────────────────────
      # Reads from GitHub Secrets — never hardcode credentials here.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Build and push ─────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            samisblessed/xtts-pipeline:latest
            samisblessed/xtts-pipeline:${{ github.sha }}
          # Cache layers between runs using GitHub's cache storage.
          # On re-runs, unchanged layers (PyTorch, TTS etc.) are
          # pulled from cache instead of reinstalled — saves ~30 min.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 6. Print summary ──────────────────────────────────────
      - name: Print image digest
        run: |
          echo "✅ Image pushed successfully!"
          echo "Image: samisblessed/xtts-pipeline:latest"
          echo "Commit tag: samisblessed/xtts-pipeline:${{ github.sha }}"
